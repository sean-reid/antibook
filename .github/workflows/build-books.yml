name: Build Books

# Trigger: weekly on Sunday at 04:00 UTC, plus manual dispatch.
on:
  schedule:
    - cron: "0 4 * * 0"
  workflow_dispatch:
    inputs:
      ids:
        description: "Space-separated Gutenberg IDs to process (leave blank for new titles only)"
        required: false
        default: ""
      force:
        description: "Force re-process books already in the manifest"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]
      limit:
        description: "Number of top titles to consider (default: 500)"
        required: false
        default: "500"

jobs:
  build-books:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Cache NLTK data
        uses: actions/cache@v4
        with:
          path: ~/nltk_data
          key: nltk-data-v2

      - name: Download NLTK corpora
        run: |
          python - <<'EOF'
          import nltk
          for corpus in ("wordnet", "averaged_perceptron_tagger", "omw-1.4", "punkt", "punkt_tab"):
              nltk.download(corpus, quiet=False)
          EOF

      # ── Restore previous dist/ from artifact cache ──────────────────────
      - name: Restore dist artifact
        uses: actions/cache@v4
        with:
          path: dist
          key: dist-books-${{ github.run_id }}
          restore-keys: dist-books-

      # ── Step 1: Ingest ────────────────────────────────────────────────────
      - name: Ingest Gutenberg books
        run: |
          EXTRA_FLAGS=""
          if [ -n "${{ inputs.ids }}" ]; then
            EXTRA_FLAGS="--ids ${{ inputs.ids }}"
          else
            EXTRA_FLAGS="--limit ${{ inputs.limit || '500' }}"
          fi
          if [ "${{ inputs.force }}" = "true" ]; then
            EXTRA_FLAGS="$EXTRA_FLAGS --force"
          fi
          python pipeline/ingest.py $EXTRA_FLAGS

      # ── Step 2: Transform ─────────────────────────────────────────────────
      - name: Transform books → AntiBooks
        run: |
          EXTRA_FLAGS=""
          if [ -n "${{ inputs.ids }}" ]; then
            EXTRA_FLAGS="--ids ${{ inputs.ids }}"
          fi
          if [ "${{ inputs.force }}" = "true" ]; then
            EXTRA_FLAGS="$EXTRA_FLAGS --force"
          fi
          python pipeline/transform.py $EXTRA_FLAGS

      # ── Step 3: Chunk ─────────────────────────────────────────────────────
      - name: Chunk AntiBooks
        run: |
          EXTRA_FLAGS=""
          if [ -n "${{ inputs.ids }}" ]; then
            EXTRA_FLAGS="--ids ${{ inputs.ids }}"
          fi
          if [ "${{ inputs.force }}" = "true" ]; then
            EXTRA_FLAGS="$EXTRA_FLAGS --force"
          fi
          python pipeline/chunk.py $EXTRA_FLAGS

      # ── Step 4: Build search catalog ─────────────────────────────────────
      - name: Build search catalog
        run: python pipeline/index.py

      # ── Stats ─────────────────────────────────────────────────────────────
      - name: Print build stats
        run: |
          echo "=== Build summary ==="
          python - <<'EOF'
          import json, pathlib
          catalog_path = pathlib.Path("dist/catalog.json")
          manifest_path = pathlib.Path("dist/manifest.json")

          if catalog_path.exists():
              catalog = json.loads(catalog_path.read_text())
              print(f"Books in catalog: {len(catalog):,}")
              total_words = sum(b.get("word_count", 0) for b in catalog)
              print(f"Total words:      {total_words:,}")
              size_kb = catalog_path.stat().st_size / 1024
              print(f"catalog.json:     {size_kb:.1f} KB")

          books_dir = pathlib.Path("dist/books")
          if books_dir.exists():
              chunks = list(books_dir.glob("*/chunk-*.json"))
              print(f"Chunk files:      {len(chunks):,}")
              total_bytes = sum(p.stat().st_size for p in books_dir.rglob("*") if p.is_file())
              print(f"dist/books size:  {total_bytes / 1024 / 1024:.1f} MB")
          EOF

      # ── Commit updated catalog data ───────────────────────────────────────
      - name: Commit updated catalog metadata
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/gutenberg-catalog.json
          if git diff --cached --quiet; then
            echo "No catalog changes to commit."
          else
            git commit -m "chore: update gutenberg catalog [skip ci]"
            git push
          fi

      # ── Upload dist/ as artifact for deploy job ───────────────────────────
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-books
          path: dist/
          retention-days: 7

      # ── Trigger deploy ────────────────────────────────────────────────────
      - name: Trigger deploy workflow
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              workflow_id: 'deploy.yml',
              ref: 'main',
            });
